version: '3.8'

services:
  app:
    build: .
    container_name: wastewise-app
    labels:
      - "app.name=WasteWise"
      - "app.description=Premium eco-app for waste classification, carbon tracking, and green rewards"
      - "app.version=1.0.0"
      - "app.author=WasteWise Team"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/waste_data.db:/app/backend/waste_data.db
      - ./backend/uploads:/app/backend/uploads
    environment:
      - PORT=8000
      - PYTHONUNBUFFERED=1
    restart: always
